# Netlify build config for Vite app
# Ensures devDependencies (including Vite) are installed so "vite build" works.

[build]
  # Fresh install from lockfile so Vite's dist is complete (avoids missing constants.js from cache)
  command = "npm ci && npm run build"
  publish = "dist"

# Vite and @vitejs/plugin-react are in dependencies so they always install.
# NPM_FLAGS ensures other build tools (tailwind, postcss, etc.) from devDependencies are installed.
[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"
